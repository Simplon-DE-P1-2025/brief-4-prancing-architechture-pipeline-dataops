checks for chicago_crimes_processed:

  # ── Volume après transformation ───────────────────────────────────────────
  - row_count > 0:
      name: "Le fichier transformé ne doit pas être vide"

  # ── Doublons supprimés lors du filtrage ───────────────────────────────────
  - duplicate_count(id) = 0:
      name: "Zéro doublon sur id après transformation"

  # ── Colonnes critiques toujours renseignées ───────────────────────────────
  - missing_count(id) = 0:
      name: "id ne doit pas être null après transformation"
  - missing_count(date) = 0:
      name: "date ne doit pas être null après transformation"
  - missing_count(primary_type) = 0:
      name: "primary_type ne doit pas être null après transformation"

  # ── Cohérence des années ──────────────────────────────────────────────────
  - min(year) >= 2001:
      name: "Année minimum = 2001"
  - max(year) <= 2025:
      name: "Année maximum = 2025"

  # ── Taux de données conservées après filtrage (> 80%) ────────────────────
  - row_count > 10000:
      name: "Au moins 10 000 lignes après transformation (seuil qualité)"
